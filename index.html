<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A small utility app to connect & share.">
    <meta name="keywords" content="screen, recording, API, video, connection, calling, cloud, encryption">
    <title>Peyvand</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Stack+Sans+Text:wght@400&display=swap">
    <link rel="stylesheet" href="/style.css">
</head>

<body class="stack-sans-text-regular">
    <!-- header -->
    <div class="flex space-between sec-bg" style="padding: 1vw 2vw;">
            <img src="/logo.png" alt="peyvand" width="70px" class="pointer logo">
            <button class="btn pointer prim-bg" id="loginBtn">Login</button>
    </div>
    <!--  -->
    <span id="notificationSpan" class="flex flex-column sec-bg d-none" style="max-height: 40vh;"></span>
    <!-- body -->
    <div class="prim-bg" style="padding: 4vw;">
    </div>
    <!-- footer -->
    <div class="sec-bg" id="footer">
        <div class="flex flex-column">
            <img src="/logo.png" alt="peyvand" width="70px" class="pointer logo">
            <a href="https://github.com/sm2742/peyvand" rel="noreferrer noopener nofollow" target="_blank" class="nav-link mu-2">See on github</a>
            <span class="mu-2">@sm2742/redrooms 2026</span>
        </div>
        <div class="flex flex-column">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14028.175054350715!2d77.50460955000001!3d28.47822865!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1777627992661!5m2!1sen!2sin"
                width="300" height="200" allowfullscreen loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </div>
    <!--  -->
    <script src="/script.js"></script>

</html>
