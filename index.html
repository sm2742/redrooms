<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A small utility app to connect & share.">
    <meta name="keywords" content="screen, recording, API, video, connection, calling, cloud, encryption">
    <title>Peyvand</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Stack+Sans+Text:wght@400&display=swap">
    <link rel="stylesheet" href="/style.css">
</head>

<body class="stack-sans-text-regular">
    <!-- header -->
    <div class="sec-bg" style="padding: 1vw 2vw;">
        <img src="/logo.png" alt="peyvand" width="70px" class="pointer logo">
    </div>
    <!--  -->
    <span id="notificationSpan" class="flex flex-column sec-bg d-none" style="max-height: 40vh; z-index: 99;"></span>
    <!-- body -->
    <div class="prim-bg" style="padding: 4vw;">
        <section id="info">
            <div>My ID: <span id="myID">Connecting...</span></div>
            <div class="mu-2">on chat: <span id="chatPeer">Not Connected</span></div>
            <div class="mu-2">on call: <span id="callPeer">Not Connected</span></div>
        </section>
        <section id="checks" class="flex mu-14">
            <label for="screenCheck" class="pointer">Screen: </label>
            <input type="checkbox" class="pointer ml-14" id="screenCheck">
            <label for="audioCheck" class="pointer ml-14">Audio : </label>
            <input type="checkbox" class="pointer ml-14" id="audioCheck">
            <label for="videoCheck" class="pointer ml-14">Video: </label>
            <input type="checkbox" class="pointer ml-14" id="videoCheck" checked>
            <label for="faceCamCheck" class="pointer ml-14">Face Camera: </label>
            <input type="checkbox" class="pointer ml-14" id="faceCamCheck">
            <label for="autoSaveLocalCheck" class="pointer ml-14">Save on this device: </label>
            <input type="checkbox" class="pointer ml-14" id="autoSaveLocalCheck" checked>
            <label for="autoSaveDBCheck" class="pointer ml-14">Save on database(logged in): </label>
            <input type="checkbox" class="pointer ml-14" id="autoSaveDBCheck">
        </section>
        <section id="btns" class="flex mu-14">
            <button class="btn sec-bg" id="recordBtn" disabled>Start Recording</button>
            <button class="btn sec-bg ml-14" id="snapshot" disabled>Take Snapshot</button>
        </section>
        <section id="connect" class="flex mu-14">
            <input type="text" id="remoteID" class="btn sec-bg mr-14" placeholder="Enter remote ID">
            <div class="mu-2">
                <button class="btn sec-bg" id="connectBtn" disabled>Connect</button>
                <button class="btn sec-bg ml-14" id="callBtn" disabled>Call</button>
            </div>
        </section>
        <section id="vidplayers" class="flex mu-14">
            <video id="myPlayer" style="max-width: 45vw;" class="mr-14 mu-14" autoplay controls muted></video>
            <video id="othPlayer" style="max-width: 45vw;" class="mr-14 mu-14" autoplay controls></video>
        </section>
        <section id="chat" class="mu-14">
            <div id="messages" style="height: 25vh; overflow-y: auto; scrollbar-width: none;"></div>
            <div class="mu-2">
                <input type="file" id="fileInput" class="btn sec-bg mr-14 mu-2">
                <input type="text" id="textInput" class="btn sec-bg mr-14 mu-2" placeholder="Message">
                <button class="btn sec-bg mu-2" id="sendBtn" disabled>Send</button>
            </div>
        </section>
        <section id="bot" class="mu-14">
            <div id="botMessages" style="height: 25vh; overflow-y: auto; scrollbar-width: none;"></div>
            <div class="mu-2">
                <input type="file" id="botFileInput" class="btn sec-bg mr-14 mu-2">
                <input type="text" id="botTextInput" class="btn sec-bg mr-14 mu-2" placeholder="Message">
                <button class="btn sec-bg mu-2" id="botSendBtn" disabled>Send</button>
            </div>
        </section>
        <section id="login" class="flex flex-column mu-14">
            <div class="flex">
                <input type="text" id="email" class="btn sec-bg mr-14" placeholder="email">
                <input type="password" id="password" class="btn sec-bg mr-14" placeholder="password">
                <button class="btn pointer sec-bg mr-14 stack-sans-text-regular" id="loginBtn">Login</button>
            </div>
            <div id="files"></div>
        </section>
    </div>
    <!-- footer -->
    <div class="sec-bg" id="footer">
        <div class="flex flex-column">
            <img src="/logo.png" alt="peyvand" width="70px" class="pointer logo">
            <a href="https://github.com/sm2742/peyvand" rel="noreferrer noopener nofollow" target="_blank"
                class="nav-link mu-2">See on github</a>
        </div>
        <div class="flex flex-column">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1260374.4905752148!2d77.24249078243692!3d28.584301288631508!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1779197099902!5m2!1sen!2sin"
                width="300" height="200" allowfullscreen loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </div>
    <!--  -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"
        integrity="sha512-XEKeWX+mI3Ov+tg2evDlVQFzVOIp4T8J3cNcCEPaEUGpxJV3eZaN8rHuvnFPvQpGJBHPmrozJDMpm2xcDvtmyQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script type="module" src="/script.js"></script>
</body>

</html>
