<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A small utility app developed without AI.">
    <meta name="keywords" content="remote access, API, video, cloud, redrooms, red rooms">
    <title>Connect | Red Rooms</title>
    <link rel="shortcut icon" href="/asset/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/asset/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Text:wght@400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js" integrity="sha512-XEKeWX+mI3Ov+tg2evDlVQFzVOIp4T8J3cNcCEPaEUGpxJV3eZaN8rHuvnFPvQpGJBHPmrozJDMpm2xcDvtmyQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body class="stack-sans-text-regular">
    <!-- header -->
    <div class="flex space-between sec-bg" style="padding: 1vw 2vw;">
        <div class="flex">
            <img src="/asset/logo.png" alt="logo | red rooms" width="70px" class="pointer logo">
            <a href="/" class="nav-link ml-14 hide-mobile">Home</a>
            <a href="/record" class="nav-link ml-14 hide-mobile">Record</a>
            <a href="/connect" class="nav-link ml-14 hide-mobile">Connect</a>
        </div>
        <div>
            <button class="btn pointer prim-bg" id="loginBtn">Login</button>
        </div>
    </div>
    <span id="notificationSpan" class="flex flex-column d-none" style="max-height: 40vh;"></span>
    <!-- body -->
    <div class="prim-bg vh-90" style="padding: 4vw;">
        <div>
            <div>
                My ID: <strong id="myID">Connecting...</strong>
            </div>
            <div class="mu-2">
                Connected on chat: <strong id="chatPeer">Not Connected</strong>
            </div>
            <div class="mu-2">
                Connected on call: <strong id="callPeer">Not Connected</strong>
            </div>
        </div>
        <div class="flex mu-14">
            <div>
                <input type="text" id="remoteID" class="btn sec-bg" placeholder="Enter remote ID">
            </div>
            <div class="mu-2">
                <button class="btn sec-bg pointer" id="connectBtn" disabled>Connect</button>
                <button class="btn sec-bg pointer ml-14" id="callBtn" disabled>Call</button>
            </div>
        </div>
    </div>
    <!-- footer -->
    <div class="sec-bg" style="padding: 1vw 2vw;" id="footer">
        <div class="flex flex-column">
            <img src="/asset/logo.png" alt="logo | red rooms" width="70px" class="pointer logo">
            <a href="/" class="nav-link mu-2">Home</a>
            <a href="/record" class="nav-link mu-2">Record</a>
            <a href="/connect" class="nav-link mu-2">Connect</a>
        </div>
        <div class="flex flex-column">
            <a href="https://github.com/sm2742/redrooms" target="_blank" class="nav-link">Source Code</a>
        </div>
        <div class="flex flex-column">
            @sm2742/redrooms 2026
        </div>
    </div>
    <script src="/asset/script.js"></script>
    <script src="/connect/script.js"></script>
</body>

</html>
