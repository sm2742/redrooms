<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Static Auth + DB</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .hidden { display: none; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .logout-btn { background: #dc3545; }
        .logout-btn:hover { background: #bd2130; }
    </style>
</head>
<body>

    <!-- AUTHENTICATION BOX -->
    <div id="authSection" class="box">
        <h2>Login or Sign Up</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Log In</button>
        <button id="signUpBtn" style="background:#28a745">Sign Up</button>
        <p id="authError" style="color:red;"></p>
    </div>

    <!-- DATABASE OPERATIONS BOX -->
    <div id="appSection" class="box hidden">
        <h2>Welcome, <span id="userEmail"></span></h2>
        <button id="logoutBtn" class="logout-btn">Log Out</button>
        
        <h3>Your Private Notes</h3>
        <input type="text" id="noteInput" placeholder="Type a private note...">
        <button id="saveNoteBtn">Save Note to Firestore</button>
        
        <ul id="notesList"></ul>
    </div>

    <!-- FIREBASE MODULE SCRIPT -->
    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged  } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js'
import { getFirestore, collection, doc, addDoc, getDocs } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js'

const firebaseConfig = {
    apiKey: "AIzaSyDS7hzEKNArZOLbbiL2QcM2vxDVeSIo3mk",
    authDomain: "webstatic-c507c.firebaseapp.com",
    projectId: "webstatic-c507c",
    storageBucket: "webstatic-c507c.firebasestorage.app",
    messagingSenderId: "874107128529",
    appId: "1:874107128529:web:b08a75a87b311ebbdd93f0"
};

        // Initialize Services
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DOM Elements
        const authSection = document.getElementById('authSection');
        const appSection = document.getElementById('appSection');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const authError = document.getElementById('authError');
        const userEmailDisplay = document.getElementById('userEmail');
        const noteInput = document.getElementById('noteInput');
        const notesList = document.getElementById('notesList');

        let currentUser = null;

        // --- AUTHENTICATION LOGIC ---

        // Sign Up
        document.getElementById('signUpBtn').addEventListener('click', async () => {
            authError.textContent = "";
            try {
                await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
            } catch (error) {
                authError.textContent = error.message;
            }
        });

        // Log In
        document.getElementById('loginBtn').addEventListener('click', async () => {
            authError.textContent = "";
            try {
                await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
            } catch (error) {
                authError.textContent = error.message;
            }
        });

        // Log Out
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth);
        });

        // Track Auth State (Runs automatically on login, logout, or page refresh)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                userEmailDisplay.textContent = user.email;
                authSection.classList.add('hidden');
                appSection.classList.remove('hidden');
                loadUserData(user.uid); // Fetch their private data
            } else {
                currentUser = null;
                authSection.classList.remove('hidden');
                appSection.classList.add('hidden');
                notesList.innerHTML = "";
            }
        });

        // --- DATABASE LOGIC ---

        // Save Data (Creates or updates a document named after the user's unique UID)
        document.getElementById('saveNoteBtn').addEventListener('click', async () => {
            if (!currentUser) return;
            try {
                const userDocRef = doc(db, "users", currentUser.uid);
                await setDoc(userDocRef, {
                    note: noteInput.value,
                    lastUpdated: new Date()
                }, { merge: true }); // Merge ensures it won't overwrite other fields
                
                alert("Note saved safely!");
                loadUserData(currentUser.uid);
            } catch (error) {
                alert("Database Error: " + error.message);
            }
        });

        // Read Data
        async function loadUserData(uid) {
            notesList.innerHTML = "Loading your note...";
            try {
                const userDocRef = doc(db, "users", uid);
                const docSnap = await getDoc(userDocRef);
                
                if (docSnap.exists()) {
                    notesList.innerHTML = `<li><strong>Saved Note:</strong> ${docSnap.data().note}</li>`;
                } else {
                    notesList.innerHTML = "<li>No notes saved yet.</li>";
                }
            } catch (error) {
                notesList.innerHTML = `<li style="color:red">Access Denied: ${error.message}</li>`;
            }
        }
    </script>
</body>
</html>
