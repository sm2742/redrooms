<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A small utility app developed without AI.">
    <meta name="keywords" content="remote access, API, video, cloud, redrooms, red rooms">
    <title>Record | Red Rooms</title>
    <link rel="shortcut icon" href="/asset/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/asset/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Text:wght@400&display=swap" rel="stylesheet">
</head>

<body class="stack-sans-text-regular">
    <!-- header -->
    <div class="flex space-between sec-bg" style="padding: 1vw 2vw;">
        <div class="flex">
            <img src="/asset/logo.png" alt="logo | red rooms" width="70px" class="pointer logo">
            <a href="/" class="nav-link ml-14 hide-mobile">Home</a>
            <a href="/record" class="nav-link ml-14 hide-mobile">Record</a>
        </div>
        <div>
            <button class="btn pointer prim-bg" id="loginBtn">Login</button>
        </div>
    </div>
    <span id="notificationSpan" style="display: none;"></span>
    <!-- body -->
    <div class="prim-bg vh-90" style="padding: 4vw;">
        <div class="flex">
            <label for="screenCheck" class="pointer">Screen: </label>
            <input type="checkbox" class="pointer ml-14" id="screenCheck">
            <label for="audioCheck" class="pointer ml-14">Audio : </label>
            <input type="checkbox" class="pointer ml-14" id="audioCheck">
            <label for="videoCheck" class="pointer ml-14">Video: </label>
            <input type="checkbox" class="pointer ml-14" id="videoCheck" checked>
        </div>
        <div class="flex mu-14">
            <button class="btn sec-bg" id="recordBtn" disabled>Start Recording</button>
            <button class="btn sec-bg ml-14" id="snapshot" disabled>Take Snapshot</button>
        </div>
        <div class="flex mu-14">
            <video id="player" style="width: 500px; max-width: 85vw;" class="ml-14" autoplay controls muted></video>
            <canvas id="canvas" style="width: 500px; max-width: 85vw;" class="ml-14"></canvas>
        </div>
        <div class="mu-14" id="deviceList">
            Available Devices:
        </div>
    </div>
    <!-- footer -->
    <div class="sec-bg" style="padding: 1vw 2vw;" id="footer">
        <div class="flex flex-column">
            <img src="/asset/logo.png" alt="logo | red rooms" width="70px" class="pointer logo">
            <a href="/" class="nav-link mu-2">Home</a>
            <a href="/record" class="nav-link mu-2">Record</a>
        </div>
        <div class="flex flex-column">
            <a href="https://github.com/sm2742/redrooms" target="_blank" class="nav-link">Source Code</a>
        </div>
        <div class="flex flex-column">
            @sm2742/redrooms 2026
        </div>
    </div>
    <script src="/asset/script.js"></script>
    <script src="/record/script.js"></script>
</body>

</html>
